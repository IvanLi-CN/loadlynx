name: Label Gate

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - ready_for_review
      - labeled
      - unlabeled
  merge_group:
    types:
      - checks_requested

permissions:
  contents: read
  pull-requests: read

jobs:
  label-gate:
    name: Label Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted policy
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Validate release labels
        run: |
          node .github/scripts/release-labels.mjs validate \
            --event "$GITHUB_EVENT_PATH" \
            --policy .github/release-label-policy.json \
            --output release-intent.json

      - name: Upload release intent snapshot
        uses: actions/upload-artifact@v4
        with:
          name: release-intent
          path: release-intent.json
          if-no-files-found: error
