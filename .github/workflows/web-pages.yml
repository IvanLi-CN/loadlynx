name: Web Deploy (GitHub Pages)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Published release tag whose Web bundle should be deployed"
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout deployment tooling
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Download published release Web bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag='${{ inputs.release_tag }}'
          mkdir -p dist/release
          gh release download "$tag" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "loadlynx-web-$tag.tar.gz" \
            --dir dist/release

      - name: Validate and prepare release bundle
        run: |
          node .github/scripts/prepare-pages-release-bundle.mjs \
            --archive "dist/release/loadlynx-web-${{ inputs.release_tag }}.tar.gz" \
            --tag "${{ inputs.release_tag }}" \
            --output dist/pages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/pages

  deploy:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
