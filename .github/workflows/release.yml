name: Release (LoadLynx analog)

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: 'Is this a prerelease version'
        required: false
        default: false
        type: boolean

jobs:
  host-tools:
    name: Build host tools (${{ matrix.slug }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - slug: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: loadlynx-host-tools-linux-x86_64.tar.gz
          - slug: macos-aarch64
            os: macos-14
            target: aarch64-apple-darwin
            archive: loadlynx-host-tools-macos-aarch64.tar.gz
          - slug: macos-x86_64
            os: macos-15-intel
            target: x86_64-apple-darwin
            archive: loadlynx-host-tools-macos-x86_64.tar.gz
          - slug: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: loadlynx-host-tools-windows-x86_64.tar.gz

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux host dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libudev-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.90
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and devd target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tools/loadlynx-devd/target
          key: ${{ runner.os }}-${{ matrix.target }}-devd-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-devd-cargo-

      - name: Build loadlynx host tools
        run: cargo build --manifest-path tools/loadlynx-devd/Cargo.toml --release --locked --bins --target "${{ matrix.target }}"

      - name: Package loadlynx host tools
        shell: bash
        run: |
          set -euo pipefail
          bin_ext=""
          if [ "${{ runner.os }}" = "Windows" ]; then
            bin_ext=".exe"
          fi

          package_dir="dist/package"
          mkdir -p "$package_dir"
          cp "tools/loadlynx-devd/target/${{ matrix.target }}/release/loadlynx-devd${bin_ext}" "$package_dir/"
          cp "tools/loadlynx-devd/target/${{ matrix.target }}/release/loadlynx${bin_ext}" "$package_dir/"
          printf '%s\n' \
            'LoadLynx host tools' \
            '' \
            '- loadlynx-devd: local USB CDC bridge for loadlynx CLI workflows.' \
            '- loadlynx: command-line helper for USB/devd-first LoadLynx hardware workflows.' \
            '' \
            'Use the user operations skill for released CLI-only hardware operation and the developer operations skill for maintenance.' \
            > "$package_dir/README.txt"
          tar -czf "dist/${{ matrix.archive }}" -C "$package_dir" .

      - name: Upload host tool artifact
        uses: actions/upload-artifact@v4
        with:
          name: loadlynx-host-tools-${{ matrix.slug }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error

  release:
    needs: host-tools
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Rust toolchain (STM32G431, thumbv7em-none-eabihf)
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.90
          components: rust-src, llvm-tools-preview
          targets: thumbv7em-none-eabihf

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            firmware/analog/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Generate semantic version
        id: version
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          major_pattern: "BREAKING CHANGE:"
          minor_pattern: "feat:"
          version_format: "${major}.${minor}.${patch}"
          bump_each_commit: false
          search_commit_body: true
          user_format_type: "csv"
          enable_prerelease_mode: ${{ github.event.inputs.prerelease }}
          debug: false

      - name: Override version type if specified
        id: final_version
        run: |
          if [ "${{ github.event.inputs.version_type }}" = "major" ]; then
            VERSION="${{ steps.version.outputs.major_version }}"
          elif [ "${{ github.event.inputs.version_type }}" = "minor" ]; then
            VERSION="${{ steps.version.outputs.minor_version }}"
          else
            VERSION="${{ steps.version.outputs.version }}"
          fi
          if [ "${{ github.event.inputs.prerelease }}" = "true" ]; then
            VERSION="${VERSION}-rc.$(date +'%Y%m%d%H%M%S')"
          fi
          echo "version=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Final version: v$VERSION"

      - name: Build release binary (LoadLynx analog)
        working-directory: firmware/analog
        run: cargo build --release --target thumbv7em-none-eabihf

      - name: Download host tool assets
        uses: actions/download-artifact@v4
        with:
          pattern: loadlynx-host-tools-*
          path: dist/host-tools
          merge-multiple: true

      - name: Generate changelog
        id: changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "## Changes" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            echo "Initial release" >> CHANGELOG.md
          else
            echo "## Changes" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            git log --pretty=format:"- %s (%h)" "$LAST_TAG"..HEAD >> CHANGELOG.md
            if [ ! -s CHANGELOG.md ] || [ "$(wc -l < CHANGELOG.md)" -le 2 ]; then
              echo "- Code optimization and bug fixes" >> CHANGELOG.md
            fi
          fi
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          cat CHANGELOG.md >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.final_version.outputs.version }}
          name: "Release ${{ steps.final_version.outputs.version }} (LoadLynx analog)"
          body: |
            🎉 Official Release (LoadLynx analog firmware)

            ${{ steps.changelog.outputs.changelog }}

            Build Information
            - Build Time: $(date +'%Y-%m-%d %H:%M:%S UTC')
            - Commit Hash: ${{ github.sha }}
            - Target Architecture: thumbv7em-none-eabihf (STM32G431)

            Files
            - `analog` - Main firmware (ELF with debug info)
            - `loadlynx-host-tools-*.tar.gz` - Host companion/devd bridge and CLI (`loadlynx-devd`, `loadlynx`)

            Flashing and Usage
            - Recommended: `mcu-agentd` (configured by `mcu-agentd.toml`)
            ```bash
            # From repo root
            just agentd flash analog
            just agentd monitor analog --reset
            ```
          files: |
            firmware/analog/target/thumbv7em-none-eabihf/release/analog
            dist/host-tools/loadlynx-host-tools-*.tar.gz
          prerelease: ${{ github.event.inputs.prerelease }}
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
