name: Release (LoadLynx)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to backfill/re-run release intent for"
        required: false
        type: string
      release_tag:
        description: "Existing or explicit tag to backfill without recomputing the bump"
        required: false
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  intent:
    name: Resolve release intent
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.resolve.outputs.pr_number }}
      type: ${{ steps.resolve.outputs.type }}
      channel: ${{ steps.resolve.outputs.channel }}
      components: ${{ steps.resolve.outputs.components }}
      base_version: ${{ steps.resolve.outputs.base_version }}
      version: ${{ steps.resolve.outputs.version }}
      tag: ${{ steps.resolve.outputs.tag }}
      prerelease: ${{ steps.resolve.outputs.prerelease }}
      should_release: ${{ steps.resolve.outputs.should_release }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Resolve release intent
        id: resolve
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          args=()
          if [ -n "${{ github.event.inputs.pr_number || '' }}" ]; then
            args+=(--pr-number "${{ github.event.inputs.pr_number }}")
          fi
          if [ -n "${{ github.event.inputs.release_tag || '' }}" ]; then
            args+=(--release-tag "${{ github.event.inputs.release_tag }}")
          fi
          node .github/scripts/release-labels.mjs resolve \
            --event "$GITHUB_EVENT_PATH" \
            --policy .github/release-label-policy.json \
            --output release-intent.json \
            "${args[@]}"

      - name: Upload release intent snapshot
        uses: actions/upload-artifact@v4
        with:
          name: release-intent
          path: release-intent.json
          if-no-files-found: error

  host-tools:
    name: Build host tools (${{ matrix.slug }})
    needs: intent
    if: needs.intent.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - slug: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: loadlynx-host-tools-linux-x86_64.tar.gz
          - slug: macos-aarch64
            os: macos-14
            target: aarch64-apple-darwin
            archive: loadlynx-host-tools-macos-aarch64.tar.gz
          - slug: macos-x86_64
            os: macos-15-intel
            target: x86_64-apple-darwin
            archive: loadlynx-host-tools-macos-x86_64.tar.gz
          - slug: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: loadlynx-host-tools-windows-x86_64.tar.gz
    env:
      LOADLYNX_RELEASE_VERSION: ${{ needs.intent.outputs.version }}
      LOADLYNX_RELEASE_TAG: ${{ needs.intent.outputs.tag }}
      LOADLYNX_PROJECT_VERSION: ${{ needs.intent.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux host dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libudev-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.90
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and devd target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tools/loadlynx-devd/target
          key: ${{ runner.os }}-${{ matrix.target }}-devd-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-devd-cargo-

      - name: Build loadlynx host tools
        run: cargo build --manifest-path tools/loadlynx-devd/Cargo.toml --release --locked --bins --target "${{ matrix.target }}"

      - name: Package loadlynx host tools
        shell: bash
        run: |
          set -euo pipefail
          bin_ext=""
          if [ "${{ runner.os }}" = "Windows" ]; then
            bin_ext=".exe"
          fi

          package_dir="dist/package"
          mkdir -p "$package_dir"
          cp "tools/loadlynx-devd/target/${{ matrix.target }}/release/loadlynx-devd${bin_ext}" "$package_dir/"
          cp "tools/loadlynx-devd/target/${{ matrix.target }}/release/loadlynx${bin_ext}" "$package_dir/"
          printf '%s\n' \
            'LoadLynx host tools' \
            '' \
            "Version: ${LOADLYNX_RELEASE_TAG}" \
            '' \
            '- loadlynx-devd: local USB CDC bridge for loadlynx CLI workflows.' \
            '- loadlynx: command-line helper for USB/devd-first LoadLynx hardware workflows, including user-level hardware memory.' \
            > "$package_dir/README.txt"
          printf '%s\n' "$LOADLYNX_RELEASE_TAG" > "$package_dir/VERSION.txt"
          tar -czf "dist/${{ matrix.archive }}" -C "$package_dir" .

      - name: Upload host tool artifact
        uses: actions/upload-artifact@v4
        with:
          name: loadlynx-host-tools-${{ matrix.slug }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error

  firmware:
    name: Build firmware artifacts
    needs: intent
    if: needs.intent.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    env:
      LOADLYNX_RELEASE_VERSION: ${{ needs.intent.outputs.version }}
      LOADLYNX_RELEASE_TAG: ${{ needs.intent.outputs.tag }}
      LOADLYNX_PROJECT_VERSION: ${{ needs.intent.outputs.version }}
      DIGITAL_WIFI_SSID: codex_dummy
      DIGITAL_WIFI_PSK: codex_dummy
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Rust toolchain (STM32G431)
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.90
          components: rust-src, llvm-tools-preview
          targets: thumbv7em-none-eabihf

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            firmware/analog/target
            firmware/digital/target
          key: ${{ runner.os }}-firmware-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-firmware-cargo-

      - name: Build analog firmware
        working-directory: firmware/analog
        run: cargo build --release --target thumbv7em-none-eabihf

      - name: Install ESP Rust toolchain
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          cargo install espup --locked
          espup install --targets esp32s3

      - name: Install just
        run: cargo install just --locked

      - name: Build digital firmware
        run: |
          . "$HOME/export-esp.sh"
          just d-build

      - name: Package firmware artifacts
        run: |
          set -euo pipefail
          mkdir -p dist/firmware
          cp firmware/analog/target/thumbv7em-none-eabihf/release/analog "dist/firmware/loadlynx-analog-${LOADLYNX_RELEASE_TAG}.elf"
          cp firmware/digital/target/xtensa-esp32s3-none-elf/release/digital "dist/firmware/loadlynx-digital-${LOADLYNX_RELEASE_TAG}.elf"
          cp tmp/analog-fw-version.txt "dist/firmware/loadlynx-analog-${LOADLYNX_RELEASE_TAG}.version.txt"
          cp tmp/digital-fw-version.txt "dist/firmware/loadlynx-digital-${LOADLYNX_RELEASE_TAG}.version.txt"
          python3 tools/firmware-catalog/build-catalog-entry.py \
            --target analog_stm32g431 \
            --artifact-id "loadlynx-analog-${LOADLYNX_RELEASE_TAG}" \
            --name "LoadLynx analog STM32G431 ${LOADLYNX_RELEASE_TAG}" \
            --package-version "${LOADLYNX_RELEASE_VERSION}" \
            --file "dist/firmware/loadlynx-analog-${LOADLYNX_RELEASE_TAG}.elf" \
            --output dist/firmware/analog-catalog.json
          python3 tools/firmware-catalog/build-catalog-entry.py \
            --target digital_esp32s3 \
            --artifact-id "loadlynx-digital-${LOADLYNX_RELEASE_TAG}" \
            --name "LoadLynx digital ESP32-S3 ${LOADLYNX_RELEASE_TAG}" \
            --package-version "${LOADLYNX_RELEASE_VERSION}" \
            --file "dist/firmware/loadlynx-digital-${LOADLYNX_RELEASE_TAG}.elf" \
            --output dist/firmware/digital-catalog.json
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          out = Path("dist/firmware")
          artifacts = []
          for name in ["analog-catalog.json", "digital-catalog.json"]:
              data = json.loads((out / name).read_text())
              for artifact in data["artifacts"]:
                  for file in artifact["files"]:
                      file["path"] = Path(file["path"]).name
                  artifacts.append(artifact)
          tag = os.environ["LOADLYNX_RELEASE_TAG"]
          (out / f"loadlynx-firmware-catalog-{tag}.json").write_text(
              json.dumps({"schema_version": "1", "artifacts": artifacts}, indent=2, sort_keys=True) + "\n"
          )
          (out / "analog-catalog.json").unlink()
          (out / "digital-catalog.json").unlink()
          PY

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: loadlynx-firmware
          path: dist/firmware/*
          if-no-files-found: error

  web:
    name: Build web bundle
    needs: intent
    if: needs.intent.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    env:
      APP_EFFECTIVE_VERSION: ${{ needs.intent.outputs.version }}
      VITE_APP_VERSION: ${{ needs.intent.outputs.version }}
      VITE_APP_GIT_TAG: ${{ needs.intent.outputs.tag }}
      VITE_APP_GIT_SHA: ${{ github.sha }}
      VITE_GITHUB_REPO: ${{ github.repository }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install dependencies
        working-directory: web
        run: |
          if [ -f package-lock.json ]; then
            echo "ERROR: web/package-lock.json is not supported. Use Bun and web/bun.lock only." >&2
            exit 1
          fi
          bun ci

      - name: Build web app
        working-directory: web
        run: bun run build

      - name: Package web bundle
        run: |
          set -euo pipefail
          mkdir -p dist/web
          tar -czf "dist/web/loadlynx-web-${{ needs.intent.outputs.tag }}.tar.gz" -C web/dist .

      - name: Upload web bundle
        uses: actions/upload-artifact@v4
        with:
          name: loadlynx-web
          path: dist/web/*
          if-no-files-found: error

  release:
    name: Create GitHub release
    needs:
      - intent
      - host-tools
      - firmware
      - web
    if: needs.intent.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ needs.intent.outputs.tag }}
      RELEASE_URL: https://github.com/${{ github.repository }}/releases/tag/${{ needs.intent.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Download release intent
        uses: actions/download-artifact@v4
        with:
          name: release-intent
          path: dist/intent

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: loadlynx-*
          path: dist/release
          merge-multiple: true

      - name: Add installer scripts
        run: |
          set -euo pipefail
          cp tools/loadlynx-devd/install/install-loadlynx-host.sh dist/release/
          cp tools/loadlynx-devd/install/install-loadlynx-host.ps1 dist/release/

      - name: Generate SHA256SUMS
        run: |
          set -euo pipefail
          (
            cd dist/release
            find . -maxdepth 1 -type f ! -name SHA256SUMS -printf '%f\n' \
              | sort \
              | xargs sha256sum > SHA256SUMS
          )

      - name: Generate changelog
        id: changelog
        run: |
          set -euo pipefail
          LAST_TAG=$(git tag --list 'v[0-9]*' --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | grep -vx "$RELEASE_TAG" | head -n 1 || true)
          {
            echo "## Changes"
            echo
            if [ -z "$LAST_TAG" ]; then
              echo "Initial release"
            else
              git log --pretty=format:"- %s (%h)" "$LAST_TAG"..HEAD
              echo
            fi
          } > CHANGELOG.md
          if ! grep -q '^- ' CHANGELOG.md; then
            echo "- Code optimization and bug fixes" >> CHANGELOG.md
          fi
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          cat CHANGELOG.md >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Collect asset names
        id: assets
        run: |
          set -euo pipefail
          find dist/release -maxdepth 1 -type f -printf '%f\n' | sort | paste -sd, - > assets.csv
          echo "csv=$(cat assets.csv)" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.intent.outputs.tag }}
          name: "Release ${{ needs.intent.outputs.tag }} (LoadLynx)"
          body: |
            LoadLynx release generated from PR #${{ needs.intent.outputs.pr_number }}.

            ${{ steps.changelog.outputs.changelog }}

            Build Information
            - Commit Hash: ${{ github.sha }}
            - Release Type: ${{ needs.intent.outputs.type }}
            - Release Channel: ${{ needs.intent.outputs.channel }}
            - Components: ${{ needs.intent.outputs.components }}

            Files
            - `SHA256SUMS` - SHA-256 checksums for every release asset
            - `install-loadlynx-host.sh` / `install-loadlynx-host.ps1` - User-level host tools installers
            - `loadlynx-analog-*.elf` - Analog STM32G431 firmware ELF
            - `loadlynx-digital-*.elf` - Digital ESP32-S3 firmware ELF
            - `loadlynx-firmware-catalog-*.json` - Firmware catalog consumed by host tools and Web Serial flash flows
            - `loadlynx-host-tools-*.tar.gz` - Host companion/devd bridge and CLI
            - `loadlynx-web-*.tar.gz` - Web console static bundle
          files: dist/release/*
          prerelease: ${{ needs.intent.outputs.prerelease }}
          draft: false

      - name: Comment on source PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node .github/scripts/release-labels.mjs comment \
            --snapshot dist/intent/release-intent.json \
            --release-url "$RELEASE_URL" \
            --assets "${{ steps.assets.outputs.csv }}"
