pre-commit:
  parallel: true
  commands:
    fmt:
      glob: "*.{rs}"
      run: bash scripts/format_staged.sh
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: bash -lc 'ROOT="$(git rev-parse --git-common-dir)/.."; MSG="$1"; cd "$ROOT" && npm exec -- commitlint --config "$ROOT/commitlint.config.cjs" --edit "$MSG"' -- {1}
